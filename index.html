        /* 相机机身 */
        'M18 28 L46 28 L48 46 L16 46 Z',
        /* 闪光灯（左上，不超出本体） */
        'M20 28 L20 24 L26 24 L26 28',
        /* 镜头 */
        'M26 34 A6 6 0 1 0 38 34 A6 6 0 1 0 26 34 Z',
      ]
    }
  ];

  const grid = document.getElementById('featureGrid');
  const cards = [];
  features.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'glass-card';

    /* SVG icon */
    let svgContent = '';
    f.paths.forEach(p => {
      if (p.startsWith('circle')) {
        const parts = p.split(' ');
        svgContent += `<circle cx="${parts[1]}" cy="${parts[2]}" r="${parts[3]}" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      } else {
        svgContent += `<path d="${p}" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      }
    });
    if (f.extraSvg) svgContent += f.extraSvg;

    card.innerHTML = `
      <div class="icon-wrap">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:rgba(255,255,255,0.85);">
          ${svgContent}
        </svg>
      </div>
      <div class="fn-name">${f.name}</div>
      <div class="fn-desc">${f.desc}</div>
    `;

    grid.appendChild(card);
    cards.push({el: card, idx: i});
  });

  /* 滚动触发卡片动画 — 观察每个卡片 */
  const cardObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = Number(e.target.dataset.index);
        setTimeout(() => e.target.classList.add('visible'), idx * 120);
        cardObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0, rootMargin: '0px 0px -40px 0px' });
  cards.forEach(({el, idx}) => {
    el.dataset.index = idx;
    cardObserver.observe(el);
  });

  /* ── 发展史数据 ── */
  const timelineData = [
    { year: '1994', text: 'Ton Roosendaard 创建第一个版本，作为公司内部建模工具。' },
    { year: '1998', text: '发布 Blender 1.0，开始商业销售。' },
    { year: '2002', text: '开源转折——社区众筹 10 万欧元，NaN 公司将 Blender 以 GPL 协议开源。' },
    { year: '2005', text: '2.40 版本发布，新增 UV 映射、骨骼系统与粒子引擎。' },
    { year: '2008', text: '2.49 版本发布，游戏引擎功能达到巅峰。' },
    { year: '2013', text: '2.6x 系列发布，全面重写核心架构，UI 大改。' },
    { year: '2015', text: '2.80 计划公布——目标是零基础用户也能上手的全流程工具。' },
    { year: '2019', text: '2.80 正式发布：Eevee 实时渲染引擎、全新 UI、集合系统。' },
    { year: '2020', text: 'Blender 基金会成立，获得 Epic Games 120 万美元资助。' },
    { year: '2023', text: '4.0 发布：资产浏览器、几何节点增强、Cycles 渲染性能大幅提升。' },
    { year: '2024', text: '4.1 LTS 发布，4.2 发布，进入稳定成熟的新时代。' },
  ];

  const tl = document.getElementById('timeline');
  const tlItems = [];
  timelineData.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.innerHTML = `
      <div class="timeline-dot"></div>
      <div class="timeline-year">${t.year}</div>
      <div class="timeline-text">${t.text}</div>
    `;
    tl.appendChild(item);
    tlItems.push({el: item, idx: i});
  });

  /* 滚动触发动画 — 淡入 */
  const tlObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = Number(e.target.dataset.index);
        setTimeout(() => e.target.classList.add('visible'), idx * 80);
        tlObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0, rootMargin: '0px 0px -40px 0px' });
  tlItems.forEach(({el, idx}) => {
    el.dataset.index = idx;
    tlObserver.observe(el);
  });

  /* ── 整页滑动 ── */
  let cp = 0;
  const pageHeights = [100, 100, 100]; /* 各页 vh 高度 */
  function getOffset(i) {
    let sum = 0;
    for (let j = 0; j < i; j++) sum += pageHeights[j];
    return sum;
  }
  const totalPages = pageHeights.length;
  const wrap = document.getElementById('pagesWrap');
  let busy = false;
  addEventListener('wheel', e => {
    if (busy) return;
    if (e.deltaY > 0 && cp < totalPages - 1) { busy = true; cp++; wrap.style.transform = `translateY(-${getOffset(cp)}vh)`; setTimeout(()=>{busy=false},900); }
    else if (e.deltaY < 0 && cp > 0) { busy = true; cp--; wrap.style.transform = `translateY(-${getOffset(cp)}vh)`; setTimeout(()=>{busy=false},900); }
  });
  let ty = 0;
  addEventListener('touchstart', e => { ty = e.changedTouches[0].screenY; });
  addEventListener('touchend', e => {
    const dy = ty - e.changedTouches[0].screenY;
    if (Math.abs(dy) > innerHeight * 0.25) {
      if (dy > 0 && cp < totalPages - 1) { busy = true; cp++; wrap.style.transform = `translateY(-${getOffset(cp)}vh)`; setTimeout(()=>{busy=false},900); }
      else if (dy < 0 && cp > 0) { busy = true; cp--; wrap.style.transform = `translateY(-${getOffset(cp)}vh)`; setTimeout(()=>{busy=false},900); }
    }
  });
</script>
